# Render Blueprint — provisions the PostgreSQL database + backend API.
# In Render: New + → Blueprint → connect this repo → it reads this file.
# (The Next.js admin UI is deployed separately on Vercel — see DEPLOY_RENDER_VERCEL.md)

databases:
  - name: pvc-db
    plan: free
    databaseName: pvc_admin
    user: pvc_user

services:
  - type: web
    name: pvc-backend
    runtime: node
    plan: free
    rootDir: pvc-backend
    buildCommand: npm install
    # Render injects PORT automatically; the server reads process.env.PORT.
    # Migrations run on every boot (idempotent) before the API starts.
    startCommand: npm run migrate && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # ── Database (auto-wired from the pvc-db database above) ──
      - key: DB_HOST
        fromDatabase: { name: pvc-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: pvc-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: pvc-db, property: database }
      - key: DB_USER
        fromDatabase: { name: pvc-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: pvc-db, property: password }
      - key: DB_SSL
        value: "true"
      - key: REDIS_ENABLED
        value: "false"
      # ── Secrets (auto-generated by Render) ──
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      # ── URLs — set AFTER the Vercel deploy (paste your Vercel URL) ──
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false
      # ── Email (set your real SMTP creds) ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM_NAME
        value: PVC Admin
      - key: MAIL_FROM_ADDRESS
        sync: false
      # ── Alerts ──
      - key: ALERT_CRON_SCHEDULE
        value: 0 8 * * *
